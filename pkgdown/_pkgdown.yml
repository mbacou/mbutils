url: https://github.mbacou.io/mbutils
destination: docs

template:
  bootstrap: 5
  image: man/figures/logo.png
  open-graph: true
  light-switch: false
  bslib:
    bg: "#f2f1f1"
    fg: "#333333"
    primary: "#5088C6"
    secondary: "#ffffff"
    border-color: "#e8e7e7"
    code-bg: "transparent"
    pre-bg: "#ffffff"
    font-weight-bold: 500
    line-height-base: 1.5
    border-radius: .25rem

development:
  mode: auto

authors:
  Melanie Bacou:
    href: https://linkedin.com/in/mbacou

home:
  title: Mel's Labs R utilities
  strip_header: false
  links:
  - text: Personal blog
    href: https://github.mbacou.io/mb-labs

navbar:
  bg: secondary
  fg: "#333333"
  type: light
  title: ~
  structure:
    left:  [articles, reference, news]
    right: [search, sep, github, linkedin, youtube, telegram]  
  components:
    home: ~  
    reference:
      text: Reference
      href: reference/index.html
    news:
      text: News
      href: news/index.html
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/mbacou/mbutils
      aria-label: Github repo
    linkedin:
      icon: fab fa-linkedin fa-lg
      href: https://linkedin.com/in/mbacou
      aria-label: Linkedin
    youtube:
      icon: fab fa-youtube fa-lg
      href: https://youtube.com/@mbacou
      aria-label: YouTube      
    telegram:
      icon: fab fa-telegram fa-lg
      href: https://t.me/mbacou
      aria-label: Telegram
    sep:
      text: "   "

reference:
- title: Bootstrap branding
  desc: >
    Utilities to apply **branding** to R plots
  contents:
  - brand_on
  - brand_off
  - brand
  - pal.brand
  - brand.colors
  - thematic_brand

- title: Branded base R plots
  desc: >
    Opinionated **plot** customizations
  contents:
  - contains("axes")
  - contains("par")

- title: Branded ggplot2 scales, axes and legend
  desc: >
    Opinionated **ggplot2** customizations
  contents:
  - contains("gg")
  - contains("scale")
  - contains("them")

- title: Utilities
  desc: >
    Misc helper functions
  contents:
  - has_keyword("utils")

- title: Boostrap themes
  desc: >
    Built-in themes, package datasets, data dictionaries...
  contents:
  - has_keyword("dataset")


